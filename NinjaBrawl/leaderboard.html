<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>Ninja Brawl - Leaderboard</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

  <div class="page-container">
    <button class="btn-back" onclick="window.location.href='index.html'">← <span data-i18n="back">BACK</span></button>

    <div class="page-title">🏆 <span data-i18n="weekly_leaderboard">WEEKLY LEADERBOARD</span></div>
    <div id="weekTimer" class="week-timer"></div>

    <!-- Top 3 Podium -->
    <div id="podium" class="podium"></div>

    <!-- Full List -->
    <div id="leaderboardList" class="lb-list"></div>

    <!-- My Rank -->
    <div id="myRank" class="my-rank hidden">
      <div class="my-rank-label" data-i18n="your_rank">YOUR RANK THIS WEEK</div>
      <div id="myRankData"></div>
    </div>

  </div>

  <script src="js/i18n.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Init i18n, Firebase, and render leaderboard
    I18n.init();
    FirebaseAuth.init();
    Leaderboard.renderPage();
  </script>
</body>
</html>
